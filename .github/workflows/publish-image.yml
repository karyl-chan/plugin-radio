name: Publish radio image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # build-push-action@v6 generates provenance attestations by default;
  # without these the push step can fail / be aborted.
  id-token: write
  attestations: write
  # Explicit `permissions:` zeroes everything not listed. cache-to gha
  # (mode=max) writes to the Actions cache and needs `actions: write`.
  actions: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    name: Push radio image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC=$(echo "${{ env.IMAGE_OWNER }}" | tr '[:upper:]' '[:lower:]')
          IMG="${{ env.REGISTRY }}/${OWNER_LC}/karyl-plugin-radio"
          echo "tags=$IMG:edge,$IMG:latest" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            karyl.plugin.key=radio
          cache-from: type=gha,scope=plugin-radio
          cache-to: type=gha,mode=max,scope=plugin-radio
